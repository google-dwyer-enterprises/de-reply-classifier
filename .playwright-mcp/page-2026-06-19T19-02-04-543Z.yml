    - heading "⚠️ How sure are we about this?" [level=3] [ref=e239]
    - paragraph [ref=e240]: "These patterns are descriptive, not proven cause-and-effect: most of the analyzed follow-ups went to leads who were already warm, so a style's score is partly who got it, not just how it was written. Notably, this playbook leans toward compliment/value openers, a clear ask and a businesslike tone — and away from the GIF-heavy, ultra-casual style currently in heavy use, because that's what the data favors."
    - paragraph [ref=e241]: The live A/B test (your curated templates vs AI-written, on the Follow-ups page) is what will prove which actually books more. Treat this as the strong starting hypothesis — and update it as the A/B fills in.