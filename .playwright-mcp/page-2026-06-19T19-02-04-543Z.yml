- generic [active] [ref=e1]:
  - heading "The optimized follow-up playbook" [level=1] [ref=e2]
  - paragraph [ref=e3]: For leads who've shown interest — the most reply-getting way to follow up, FU1 through FU5, ready to copy. Built from 3,562 real follow-ups (335 positive replies, 117 booked). Generated 2026-06-19.
  - generic [ref=e4]:
    - heading "How to follow up — the rules in one place" [level=3] [ref=e5]
    - list [ref=e6]:
      - listitem [ref=e7]: Open with a compliment or the value — never a gimmick. Replies that opened with a specific compliment landed 23% vs 9%; value-prop openers 17% vs 8%. The GIF / “pattern-interrupt” style did the opposite (3.5% vs 11%).
      - listitem [ref=e8]: Always end with ONE direct ask + your calendar link. A direct ask beat soft/no-ask (11.5% vs 7.7%), and messages that included a booking link replied at 14% vs 9% without one.
      - listitem [ref=e9]: Keep the tone businesslike, not overly casual. Neutral/formal tone outperformed casual (11-13% vs 8%). Confident and warm, not chatty.
      - listitem [ref=e10]: Aim for a short paragraph — not a one-liner, not a wall. Very-short one-liners underperformed (7.4%); medium length read best. Give enough to be concrete.
      - listitem [ref=e11]: Name the concrete model / value. Messages that mentioned the actual offer or pricing structure replied at 17% vs 8%.
      - listitem [ref=e12]: "Front-load the effort. Reply rate falls fast by stage (#1 19% → #3 10% → #6+ under 4%). The first three touches earn most of the bookings — make them count and don't drag the sequence out."
