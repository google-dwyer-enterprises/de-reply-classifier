  - generic [ref=e150]:
    - text: How to read this — and what it can't tell you.
    - list [ref=e151]:
      - listitem [ref=e152]: Descriptive, not proof. It shows where bookings happened, not that a category causes bookings. Volume matters too — check the "share of bookings" before chasing a high rate on a small base.
      - listitem [ref=e153]: "Coverage: 353 of 483 bookings (73%) have a category. 89 were recovered by borrowing their company-domain's category; the remaining 130 (mostly leads whose reply address isn't in the enrichment pool) stay uncategorized and are excluded from the ranking."
      - listitem [ref=e154]: "Confidence: categories under 30 engaged leads aren't ranked (shown as counts only); every ranked rate carries a Wilson 95% interval — wide intervals mean \"not enough data to trust the order yet.\""
      - listitem [ref=e155]: "Domain borrow assumption: leads on the same company domain are treated as the same category — safe for single-brand companies, looser for conglomerates."
      - listitem [ref=e156]: Category labels come from enrichment and mix Amazon browse categories (which dominate the ranked list) with a long tail of other industry labels; only categories with real volume are ranked.
  - paragraph [ref=e157]: Generated by scripts/gen_category_booking_report.py — re-run to refresh.